name: Publish @solana/idl

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (unchecked will publish to npm, push git tag, and create GitHub release)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  guard-allowed-branch:
    name: Guard allowed source branch for release publish
    runs-on: ubuntu-latest
    steps:
      - name: Guard allowed source branch for release publish
        run: |
          case "${{ github.ref }}" in
            refs/heads/main|refs/heads/hotfix/*) ;;
            *)
              echo "::error::Publish must be run from main or hotfix/*. Current ref: ${{ github.ref }}"
              exit 1
              ;;
          esac

  test:
    needs: guard-allowed-branch
    uses: ./.github/workflows/test.yml
    secrets: inherit

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [guard-allowed-branch, test]
    env:
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC trusted publishing support
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Check if prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.version.outputs.version }}" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "npm_tag=beta" >> $GITHUB_OUTPUT
            echo "Pre-release version detected, using 'beta' npm tag"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: pnpm run build

      - name: Pack tarball
        run: |
          mkdir -p .npm-pack
          npm pack --pack-destination .npm-pack
          echo ""
          echo "Packed tarball:"
          ls -la .npm-pack/

      - name: 'Guard - Fail if tarball missing dist/ artifacts'
        run: |
          for tarball in .npm-pack/*.tgz; do
            CONTENTS=$(tar -tzf "$tarball")

            for required in package/dist/index.js package/dist/index.d.ts package/dist/cli.js; do
              if ! echo "$CONTENTS" | grep -q "$required"; then
                echo "FAIL: ${tarball} is missing ${required}"
                exit 1
              fi
            done
          done

          echo "All required dist/ artifacts present"

      - name: Publish to npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NPM_TAG="${{ steps.prerelease.outputs.npm_tag }}"
          TARBALL=$(ls .npm-pack/*.tgz | head -1)
          DRY_RUN="${{ github.event.inputs.dry-run }}"

          if [ -z "$TARBALL" ] || [ ! -f "$TARBALL" ]; then
            echo "Tarball not found"
            ls -la .npm-pack/ || true
            exit 1
          fi

          if [ "$DRY_RUN" == "true" ]; then
            echo "DRY RUN: Publishing ${TARBALL} with tag '${NPM_TAG}'..."
            npm publish "$TARBALL" --access public --tag "$NPM_TAG" --dry-run
            echo "Dry run completed (OIDC auth validated, no package uploaded)"
          else
            echo "Publishing ${TARBALL} with tag '${NPM_TAG}'..."
            npm publish "$TARBALL" --access public --tag "$NPM_TAG"
            echo "Published successfully"
          fi

      - name: Create and push tag
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          fi

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry-run != 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = `v${{ steps.version.outputs.version }}`;
            const version = `${{ steps.version.outputs.version }}`;
            const releaseName = `@solana/idl v${version}`;
            const isPrerelease = '${{ steps.prerelease.outputs.is_prerelease }}' === 'true';

            const body = [
              `## @solana/idl v${version}`,
              '',
              '### Installation',
              '',
              '```bash',
              `npm install @solana/idl@${version}`,
              '```',
              '',
              `https://www.npmjs.com/package/@solana/idl/v/${version}`,
            ].join('\n');

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });
              console.log(`Release ${tagName} already exists, skipping`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: releaseName,
              body: body.trim(),
              draft: false,
              prerelease: isPrerelease,
            });

      - name: Publish summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NPM_TAG="${{ steps.prerelease.outputs.npm_tag }}"
          DRY_RUN="${{ github.event.inputs.dry-run }}"

          if [ "$DRY_RUN" == "true" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## @solana/idl Publish — DRY RUN

          **Version**: \`${VERSION}\`
          **npm tag**: \`${NPM_TAG}\`
          **Mode**: Dry run (OIDC auth validated, no package uploaded, no tag, no release)
          EOF
          else
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## @solana/idl Published

          **Version**: \`${VERSION}\`
          **Tag**: \`v${VERSION}\`
          **npm tag**: \`${NPM_TAG}\`

          Published to npm: https://www.npmjs.com/package/@solana/idl/v/${VERSION}
          GitHub release: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}
          EOF
          fi
