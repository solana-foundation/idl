name: Publish packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (or "all")'
        required: true
        type: choice
        options:
          - all
          - idl
          - security-txt
        default: all
      dry-run:
        description: 'Dry run (validate without publishing, tagging or releasing)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write
  pull-requests: write

# Only one publish at a time across the whole repo.
concurrency:
  group: npm-publish
  cancel-in-progress: false

env:
  # Workspace publish order. Add new packages here as they go live.
  # Names match the `packages/<dir>` folders; npm scopes come from each
  # package.json's `name` field.
  PUBLISH_PACKAGES: idl security-txt

jobs:
  guard-allowed-branch:
    name: Guard allowed source branch
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not on main or hotfix/*
        run: |
          case "${{ github.ref }}" in
            refs/heads/main|refs/heads/hotfix/*) ;;
            *)
              echo "::error::Publish must be run from main or hotfix/*. Current ref: ${{ github.ref }}"
              exit 1
              ;;
          esac

  test:
    needs: guard-allowed-branch
    uses: ./.github/workflows/test.yml
    secrets: inherit

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [guard-allowed-branch, test]
    env:
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC trusted publishing support
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Target resolution ──────────────────────────────────────────────
      - name: Resolve target packages from input
        id: targets
        run: |
          SELECTED="${{ github.event.inputs.package }}"
          if [ "$SELECTED" = "all" ]; then
            FLAT=$(echo $PUBLISH_PACKAGES | tr '\n' ' ' | xargs)
          else
            FLAT="$SELECTED"
          fi
          echo "packages=$FLAT" >> $GITHUB_OUTPUT
          echo "Selected: $SELECTED"
          echo "Resolved: $FLAT"

      - name: Filter out private packages (scaffolded / web)
        id: filter
        run: |
          PUBLISHABLE=""
          for pkg in ${{ steps.targets.outputs.packages }}; do
            IS_PRIVATE=$(node -p "require('./packages/${pkg}/package.json').private === true")
            NAME=$(node -p "require('./packages/${pkg}/package.json').name")
            if [ "$IS_PRIVATE" = "true" ]; then
              echo "· skipping ${NAME} (private: true — scaffolded, not yet ready to publish)"
            else
              PUBLISHABLE="$PUBLISHABLE $pkg"
            fi
          done
          PUBLISHABLE=$(echo $PUBLISHABLE | xargs)
          if [ -z "$PUBLISHABLE" ]; then
            echo "::error::No publishable packages remain after filtering out private ones."
            exit 1
          fi
          echo "packages=$PUBLISHABLE" >> $GITHUB_OUTPUT
          echo "Publishable: $PUBLISHABLE"

      # ─── Build + pack ───────────────────────────────────────────────────
      - name: Build target packages
        run: |
          for pkg in ${{ steps.filter.outputs.packages }}; do
            NAME=$(node -p "require('./packages/${pkg}/package.json').name")
            echo "==> Building ${NAME}"
            pnpm --filter "${NAME}" run build
          done

      - name: Pack target packages with pnpm
        # `pnpm pack` (not `npm pack`) so any `workspace:*` cross-deps
        # get rewritten to resolved versions inside the tarball.
        run: |
          mkdir -p .npm-pack
          for pkg in ${{ steps.filter.outputs.packages }}; do
            echo "==> Packing packages/${pkg}"
            (cd packages/${pkg} && pnpm pack --pack-destination ../../.npm-pack)
          done
          echo ""
          echo "Packed tarballs:"
          ls -la .npm-pack/

      # ─── Guards (fail BEFORE any publish call) ──────────────────────────
      - name: 'Guard - Tarballs must not contain workspace: protocol'
        run: |
          FAILED=0
          for tarball in .npm-pack/*.tgz; do
            tar -xzf "$tarball" package/package.json -O > /tmp/pkg.json
            if grep -q '"workspace:' /tmp/pkg.json; then
              echo "  ✗ ${tarball} contains workspace: dependencies"
              grep '"workspace:' /tmp/pkg.json || true
              FAILED=1
            else
              echo "  ✓ ${tarball}"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Use \`pnpm pack\` (not \`npm pack\`) so workspace:* is replaced with the resolved version."
            exit 1
          fi

      - name: 'Guard - Tarballs must contain required dist artifacts'
        # ESM + CJS + .d.ts for everyone; additionally every `bin` entry
        # listed in each package's package.json must exist in the tarball.
        run: |
          FAILED=0
          for pkg in ${{ steps.filter.outputs.packages }}; do
            NAME=$(node -p "require('./packages/${pkg}/package.json').name")
            VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            FILESAFE=$(echo "$NAME" | sed 's|@||; s|/|-|g')
            TARBALL=".npm-pack/${FILESAFE}-${VERSION}.tgz"
            if [ ! -f "$TARBALL" ]; then
              echo "  ✗ ${NAME}: tarball not found at ${TARBALL}"
              FAILED=1
              continue
            fi
            CONTENTS=$(tar -tzf "$TARBALL")
            LOCAL_FAIL=0
            for required in package/dist/index.js package/dist/index.cjs package/dist/index.d.ts; do
              if ! echo "$CONTENTS" | grep -q "$required"; then
                echo "  ✗ ${TARBALL} missing ${required}"
                LOCAL_FAIL=1
              fi
            done
            # bin entries: e.g. `bin: { idl: './dist/cli.js' }` → require dist/cli.js
            BIN_PATHS=$(node -p "Object.values(require('./packages/${pkg}/package.json').bin || {}).map(p => p.replace(/^\\.\\//, '')).join('\\n')" | grep -v '^$' || true)
            for bin in $BIN_PATHS; do
              if ! echo "$CONTENTS" | grep -q "package/${bin}"; then
                echo "  ✗ ${TARBALL} missing bin file package/${bin}"
                LOCAL_FAIL=1
              fi
            done
            if [ "$LOCAL_FAIL" -eq 0 ]; then
              echo "  ✓ ${TARBALL}"
            else
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      # ─── Pre-flight: dry-run publish + already-published check ──────────
      - name: 'Pre-flight - npm publish dry-run for every target'
        run: |
          FAILED=0
          echo "Authenticated as: $(npm whoami 2>/dev/null || echo '<no auth>')"
          echo ""
          for pkg in ${{ steps.filter.outputs.packages }}; do
            NAME=$(node -p "require('./packages/${pkg}/package.json').name")
            VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            FILESAFE=$(echo "$NAME" | sed 's|@||; s|/|-|g')
            TARBALL=".npm-pack/${FILESAFE}-${VERSION}.tgz"
            if [[ "$VERSION" == *"-"* ]]; then NPM_TAG="beta"; else NPM_TAG="latest"; fi
            echo "==> ${NAME}@${VERSION} (tag ${NPM_TAG})"

            # Already published?
            NPM_RC=0
            NPM_OUT=$(npm view "${NAME}@${VERSION}" version 2>&1) || NPM_RC=$?
            if [ "$NPM_RC" -eq 0 ] && [ -n "$NPM_OUT" ]; then
              echo "  ✗ ${NAME}@${VERSION} already published — bump the version or drop it from targets"
              FAILED=1
              continue
            fi
            # Distinguish a real registry error from a clean 404
            if [ "$NPM_RC" -ne 0 ] && ! echo "$NPM_OUT" | grep -q "E404"; then
              echo "  ✗ ${NAME}: registry error (not 404):"
              echo "$NPM_OUT" | sed 's/^/      /'
              FAILED=1
              continue
            fi

            if ! npm publish "$TARBALL" --access public --tag "$NPM_TAG" --dry-run > /tmp/dryrun-${pkg}.log 2>&1; then
              echo "  ✗ ${NAME}@${VERSION} dry-run failed:"
              sed 's/^/      /' /tmp/dryrun-${pkg}.log
              FAILED=1
              continue
            fi
            echo "  ✓ ${NAME}@${VERSION}"
          done
          echo ""
          if [ "$FAILED" -eq 1 ]; then
            echo "Pre-flight failed. Aborting BEFORE any real publish."
            exit 1
          fi

      # ─── Real publish (skipped on dry-run) ──────────────────────────────
      - name: Publish to npm
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          for pkg in ${{ steps.filter.outputs.packages }}; do
            NAME=$(node -p "require('./packages/${pkg}/package.json').name")
            VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            FILESAFE=$(echo "$NAME" | sed 's|@||; s|/|-|g')
            TARBALL=".npm-pack/${FILESAFE}-${VERSION}.tgz"
            if [[ "$VERSION" == *"-"* ]]; then NPM_TAG="beta"; else NPM_TAG="latest"; fi
            echo "==> Publishing ${NAME}@${VERSION} (tag ${NPM_TAG})"
            npm publish "$TARBALL" --access public --tag "$NPM_TAG"
          done

      - name: Create and push tags
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          for pkg in ${{ steps.filter.outputs.packages }}; do
            VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            TAG="${pkg}-v${VERSION}"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "· tag $TAG already exists"
            else
              git tag "$TAG"
              git push origin "$TAG"
              echo "✓ created tag $TAG"
            fi
          done

      - name: Create GitHub Releases (one per published package)
        if: ${{ github.event.inputs.dry-run != 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const packages = `${{ steps.filter.outputs.packages }}`.trim().split(/\s+/).filter(Boolean);
            for (const pkg of packages) {
              const pj = JSON.parse(fs.readFileSync(`packages/${pkg}/package.json`, 'utf8'));
              const { name, version } = pj;
              const tagName = `${pkg}-v${version}`;
              const releaseName = `${name} v${version}`;
              const isPrerelease = version.includes('-');
              const body = [
                `## ${name} v${version}`,
                '',
                '### Installation',
                '',
                '```bash',
                `npm install ${name}@${version}`,
                '```',
                '',
                `https://www.npmjs.com/package/${name}/v/${version}`,
              ].join('\n');
              try {
                await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: tagName,
                });
                console.log(`· release ${tagName} already exists`);
                continue;
              } catch (e) {
                if (e.status !== 404) throw e;
              }
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: releaseName,
                body: body.trim(),
                draft: false,
                prerelease: isPrerelease,
              });
              console.log(`✓ created release ${releaseName}`);
            }

      - name: Publish summary
        if: always()
        run: |
          DRY_RUN="${{ github.event.inputs.dry-run }}"
          {
            if [ "$DRY_RUN" = "true" ]; then
              echo "## Publish — DRY RUN"
            else
              echo "## Published"
            fi
            echo ""
            echo "| Package | Version | npm tag | Status |"
            echo "|---------|---------|---------|--------|"
            for pkg in ${{ steps.filter.outputs.packages }}; do
              NAME=$(node -p "require('./packages/${pkg}/package.json').name")
              VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
              if [[ "$VERSION" == *"-"* ]]; then NPM_TAG="beta"; else NPM_TAG="latest"; fi
              if [ "$DRY_RUN" = "true" ]; then
                STATUS="dry-run validated"
              else
                STATUS="https://www.npmjs.com/package/${NAME}/v/${VERSION}"
              fi
              echo "| \`${NAME}\` | \`${VERSION}\` | \`${NPM_TAG}\` | ${STATUS} |"
            done
          } >> $GITHUB_STEP_SUMMARY
